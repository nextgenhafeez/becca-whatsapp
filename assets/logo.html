<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Quicksand:wght@600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;width:512px;height:512px;overflow:hidden;}
  .box{width:512px;height:512px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#ff8fb1 0%,#b197fc 52%,#7fd4ff 100%);
    font-family:'Baloo 2',system-ui,sans-serif;}
  .badge{width:248px;height:248px;border-radius:68px;background:rgba(255,255,255,.95);
    display:flex;align-items:center;justify-content:center;box-shadow:0 18px 46px rgba(0,0,0,.22);}
  .leaf{font-size:138px;line-height:1;}
  .name{margin-top:20px;font-size:78px;font-weight:800;color:#fff;line-height:1;text-shadow:0 5px 16px rgba(0,0,0,.18);}
  .tag{margin-top:6px;font-size:25px;color:#fff;opacity:.95;font-family:'Quicksand',sans-serif;font-weight:600;letter-spacing:1px;}
</style></head>
<body><div class="box">
  <div class="badge"><span class="leaf">🍁</span></div>
  <div class="name">Becca</div>
</div></body></html>
