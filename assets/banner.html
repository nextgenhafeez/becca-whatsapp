<!doctype html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">
<style>
  html,body{margin:0;padding:0;width:1600px;height:300px;overflow:hidden;}
  .b{width:1600px;height:300px;display:flex;align-items:center;padding:0 80px;box-sizing:border-box;
    background:linear-gradient(110deg,#ff8fb1 0%,#b197fc 55%,#7fd4ff 100%);
    color:#fff;font-family:'Baloo 2',system-ui,sans-serif;position:relative;overflow:hidden;}
  .leaf{font-size:150px;margin-right:46px;filter:drop-shadow(0 6px 14px rgba(0,0,0,.18));}
  .t{font-size:104px;font-weight:800;line-height:1;text-shadow:0 5px 16px rgba(0,0,0,.15);}
  .s{font-size:38px;font-weight:600;font-family:'Quicksand',sans-serif;opacity:.97;margin-top:10px;}
  .deco{position:absolute;opacity:.85;}
  .d1{top:30px;right:120px;font-size:60px;} .d2{bottom:34px;right:300px;font-size:48px;}
  .d3{top:40px;right:330px;font-size:40px;}
</style></head>
<body><div class="b">
  <span class="leaf">🍁</span>
  <div><div class="t">Becca</div><div class="s">Early Learning &amp; Childcare Documentation</div></div>
  <span class="deco d1">✨</span><span class="deco d2">🧩</span><span class="deco d3">⭐</span>
</div></body></html>
